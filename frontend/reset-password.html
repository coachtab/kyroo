<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYROO - Reset Password</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0d0c14; --surface: #161521; --border: rgba(255,255,255,0.04); --text: #f2ede6; --text-2: #928d84; --text-3: #524e48; --accent: #f0845a; --sage: #82a96f; --heading: 'Nunito', sans-serif; --body: 'Inter', sans-serif; --ease: cubic-bezier(0.34,1.56,0.64,1); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { max-width: 380px; width: 100%; padding: 24px; }
    h1 { font-family: var(--heading); font-size: 1.5rem; margin-bottom: 8px; }
    p { font-size: 0.875rem; color: var(--text-2); margin-bottom: 24px; }
    form { display: flex; flex-direction: column; gap: 10px; }
    input { padding: 13px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); font-family: var(--body); font-size: 0.875rem; outline: none; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-3); }
    button { padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 999px; font-family: var(--body); font-size: 0.8125rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #d4906c; }
    .error { font-size: 0.8125rem; color: #d46b6b; padding: 8px 12px; background: rgba(212,107,107,0.06); }
    .success { text-align: center; }
    .success h2 { font-family: var(--heading); font-size: 1.25rem; margin-bottom: 8px; }
    .success p { color: var(--sage); }
    .success a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.875rem; }
    a { color: var(--accent); text-decoration: none; font-size: 0.8125rem; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>New password</h1>
    <p>Enter your new password below.</p>
    <form id="resetForm">
      <input type="password" id="password" placeholder="New password" required minlength="6">
      <input type="password" id="confirm" placeholder="Confirm password" required minlength="6">
      <div class="error" id="error" hidden></div>
      <button type="submit">Set new password</button>
    </form>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('app').innerHTML = '<p>Invalid reset link.</p><a href="/">Go to KYROO</a>';
    }
    document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const err = document.getElementById('error');
      err.hidden = true;
      if (pw !== confirm) { err.textContent = 'Passwords do not match'; err.hidden = false; return; }
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('app').innerHTML = '<div class="success"><h2>Password updated</h2><p>You can now log in with your new password.</p><br><a href="/">Go to KYROO</a></div>';
      } catch (ex) {
        err.textContent = ex.message;
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
