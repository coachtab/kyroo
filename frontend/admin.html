<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYROO Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --parchment:#F8F5EF; --ink:#16140F; --ink-2:#6B6760; --ink-3:#A8A49F;
      --surface:#FFFFFF; --forest:#2C4A38; --amber:#B87830;
      --line:rgba(22,20,15,0.1); --line-strong:rgba(22,20,15,0.18);
      --forest-tint:rgba(44,74,56,0.06); --amber-tint:rgba(184,120,48,0.08);
      --font-serif:'Fraunces',Georgia,serif; --font-sans:'DM Sans',system-ui,sans-serif;
      --r:4px; --t:0.15s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font-sans); background:var(--parchment); color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased; }
    ::selection { background:var(--forest); color:#fff; }
    a { color:inherit; text-decoration:none; }

    .page { max-width:800px; margin:0 auto; padding:48px 24px 96px; }

    /* Header */
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:48px; padding-bottom:24px; border-bottom:1px solid var(--line); }
    .header__left { display:flex; align-items:center; gap:16px; }
    .header__back { width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line-strong); border-radius:var(--r); color:var(--ink-2); transition:color var(--t),border-color var(--t); }
    .header__back:hover { color:var(--ink); border-color:var(--forest); }
    .header__logo { font-family:var(--font-serif); font-size:1.25rem; font-weight:600; letter-spacing:0.04em; color:var(--ink); }
    .header__logo span { font-family:var(--font-sans); font-size:0.625rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--amber); margin-left:8px; vertical-align:middle; }
    .header__user { font-size:0.75rem; color:var(--ink-3); }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; margin-bottom:48px; }
    .stat { background:var(--surface); padding:28px 24px; text-align:center; }
    .stat__value { font-family:var(--font-serif); font-size:2.5rem; font-weight:600; line-height:1; color:var(--forest); margin-bottom:6px; font-variation-settings:'opsz' 72; }
    .stat__label { font-size:0.6875rem; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-3); }

    /* Section eyebrow */
    .section-title { font-size:0.6875rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); margin-bottom:12px; }
    .section-title::before { content:'// '; color:var(--amber); }

    /* Links grid */
    .links { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; margin-bottom:48px; }
    .link-card { display:flex; align-items:center; gap:16px; padding:22px 20px; background:var(--surface); transition:background var(--t); }
    .link-card:hover { background:var(--forest-tint); }
    .link-card__icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:var(--r); flex-shrink:0; border:1px solid var(--line); color:var(--ink-2); }
    .link-card:hover .link-card__icon { border-color:var(--forest); color:var(--forest); }
    .link-card__icon--accent { background:var(--amber-tint); }
    .link-card__icon--sage  { background:var(--forest-tint); }
    .link-card__icon--neutral { background:transparent; }
    .link-card__title { font-size:0.9375rem; font-weight:500; margin-bottom:2px; color:var(--ink); }
    .link-card__desc  { font-size:0.6875rem; color:var(--ink-3); }

    /* Login */
    .login { max-width:360px; margin:96px auto; }
    .login__title { font-family:var(--font-serif); font-size:1.75rem; font-weight:600; margin-bottom:6px; font-variation-settings:'opsz' 48; }
    .login__sub { font-size:0.875rem; color:var(--ink-2); margin-bottom:32px; }
    .login form { display:flex; flex-direction:column; gap:10px; }
    .input { padding:12px 14px; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r); color:var(--ink); font-family:var(--font-sans); font-size:0.875rem; outline:none; transition:border-color var(--t); }
    .input:focus { border-color:var(--forest); }
    .input::placeholder { color:var(--ink-3); }
    .btn { padding:12px 20px; background:var(--forest); color:#fff; border:none; border-radius:var(--r); font-family:var(--font-sans); font-size:0.875rem; font-weight:500; cursor:pointer; transition:opacity var(--t); }
    .btn:hover { opacity:0.88; }
    .error { font-size:0.8125rem; color:#b94040; padding:10px 14px; background:rgba(185,64,64,0.06); border:1px solid rgba(185,64,64,0.15); border-radius:var(--r); margin-top:4px; }
    .back-link { display:inline-block; margin-top:20px; font-size:0.75rem; color:var(--ink-3); }
    .back-link:hover { color:var(--ink); }

    @media(max-width:640px) { .stats{grid-template-columns:1fr} .links{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="page" id="app"></div>
  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('kyroo_token');
    let user = null;

    function headers() { return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' }; }
    function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

    async function init() {
      if (!token) return renderLogin();
      try {
        const res = await fetch(`${API}/api/auth/me`, { headers: headers() });
        if (!res.ok) throw new Error();
        user = await res.json();
        if (!user.is_admin) {
          document.getElementById('app').innerHTML = '<div class="login"><p class="login__title">Access Denied</p><p class="login__sub">Admin privileges required.</p><a href="/" class="back-link">Back to KYROO</a></div>';
          return;
        }
        renderDashboard();
      } catch (e) { renderLogin(); }
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login">
          <p class="login__title">KYROO Admin</p>
          <p class="login__sub">Log in with your admin account</p>
          <form id="loginForm">
            <input type="email" class="input" placeholder="Email" required id="email">
            <input type="password" class="input" placeholder="Password" required id="password">
            <div class="error" id="loginErr" hidden></div>
            <button type="submit" class="btn">Log in</button>
          </form>
          <a href="/" class="back-link">Back to KYROO</a>
        </div>
      `;
      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const err = document.getElementById('loginErr');
        err.hidden = true;
        try {
          const res = await fetch(`${API}/api/auth/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          if (!data.user.is_admin) throw new Error('Admin privileges required');
          token = data.token; user = data.user;
          localStorage.setItem('kyroo_token', token);
          renderDashboard();
        } catch (ex) { err.textContent = ex.message; err.hidden = false; }
      };
    }

    async function renderDashboard() {
      const stats = await fetch(`${API}/api/admin/stats`, { headers: headers() }).then(r => r.json());

      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="header__left">
            <a href="/" class="header__back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg></a>
            <span class="header__logo">KYROO <span>Admin</span></span>
          </div>
          <span class="header__user">${esc(user.name || user.email)}</span>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat__value">${stats.total_users}</div>
            <div class="stat__label">Users</div>
          </div>
          <div class="stat">
            <div class="stat__value">${stats.premium_users}</div>
            <div class="stat__label">Premium</div>
          </div>
          <div class="stat">
            <div class="stat__value">${stats.total_subscribers}</div>
            <div class="stat__label">Subscribers</div>
          </div>
        </div>

        <p class="section-title">Manage</p>
        <div class="links">
          <a href="/program.html" class="link-card">
            <div class="link-card__icon link-card__icon--accent">&#9776;</div>
            <div>
              <p class="link-card__title">Programs</p>
              <p class="link-card__desc">7 KYROO coach tools</p>
            </div>
          </a>
          <a href="/" class="link-card">
            <div class="link-card__icon link-card__icon--sage">&#9728;</div>
            <div>
              <p class="link-card__title">Main Site</p>
              <p class="link-card__desc">kyroo.de</p>
            </div>
          </a>
        </div>

        <p class="section-title">Tools</p>
        <div class="links">
          <a href="https://dashboard.stripe.com/test/payments" target="_blank" class="link-card">
            <div class="link-card__icon link-card__icon--accent">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </div>
            <div>
              <p class="link-card__title">Stripe Payments</p>
              <p class="link-card__desc">View transactions, refunds, customers</p>
            </div>
          </a>
          <a href="https://dashboard.stripe.com/test/customers" target="_blank" class="link-card">
            <div class="link-card__icon link-card__icon--neutral">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div>
              <p class="link-card__title">Stripe Customers</p>
              <p class="link-card__desc">Manage subscribers and billing</p>
            </div>
          </a>
          <a href="/api-docs/" class="link-card">
            <div class="link-card__icon link-card__icon--neutral">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>
              <p class="link-card__title">API Docs</p>
              <p class="link-card__desc">Swagger documentation</p>
            </div>
          </a>
          <a href="https://dashboard.stripe.com/test/revenue" target="_blank" class="link-card">
            <div class="link-card__icon link-card__icon--sage">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
            </div>
            <div>
              <p class="link-card__title">Revenue</p>
              <p class="link-card__desc">MRR, growth, analytics</p>
            </div>
          </a>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
