<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYROO Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root { --bg:#060606; --surface:#0d0d0d; --border:rgba(255,255,255,0.06); --text:#eae5de; --text-2:#7a756e; --text-3:#3d3a37; --accent:#c27a56; --sage:#7d8c68; --sans:'Space Grotesk',sans-serif; --serif:'DM Serif Display',serif; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); line-height:1.6; }
    a { color:inherit; text-decoration:none; }

    .page { max-width:800px; margin:0 auto; padding:40px 24px 80px; }

    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:48px; }
    .header__left { display:flex; align-items:center; gap:14px; }
    .header__back { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:8px; color:var(--text-3); transition:all 0.15s; }
    .header__back:hover { color:var(--text); border-color:rgba(255,255,255,0.12); }
    .header__logo { font-family:var(--serif); font-size:1.125rem; letter-spacing:0.1em; }
    .header__logo span { font-family:var(--sans); font-size:0.625rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-left:8px; }
    .header__user { font-size:0.75rem; color:var(--text-3); }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:48px; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; text-align:center; }
    .stat__value { font-family:var(--serif); font-size:2.5rem; line-height:1; margin-bottom:6px; }
    .stat__label { font-size:0.625rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-3); }

    /* Section */
    .section-title { font-size:0.5625rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-3); margin-bottom:16px; }

    /* Links grid */
    .links { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:48px; }
    .link-card { display:flex; align-items:center; gap:16px; padding:22px 20px; background:var(--surface); border:1px solid var(--border); border-radius:14px; transition:all 0.2s; }
    .link-card:hover { border-color:rgba(255,255,255,0.1); transform:translateY(-1px); }
    .link-card__icon { width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:12px; font-size:1.25rem; flex-shrink:0; }
    .link-card__icon--accent { background:rgba(194,122,86,0.08); }
    .link-card__icon--sage { background:rgba(125,140,104,0.08); }
    .link-card__icon--neutral { background:rgba(255,255,255,0.03); }
    .link-card__title { font-size:0.875rem; font-weight:600; margin-bottom:2px; }
    .link-card__desc { font-size:0.6875rem; color:var(--text-3); }

    /* Login */
    .login { max-width:340px; margin:80px auto; text-align:center; }
    .login__title { font-family:var(--serif); font-size:1.5rem; margin-bottom:6px; }
    .login__sub { font-size:0.8125rem; color:var(--text-2); margin-bottom:28px; }
    .login form { display:flex; flex-direction:column; gap:10px; }
    .input { padding:13px 16px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--sans); font-size:0.875rem; outline:none; }
    .input:focus { border-color:var(--accent); }
    .input::placeholder { color:var(--text-3); }
    .btn { padding:13px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-family:var(--sans); font-size:0.8125rem; font-weight:600; cursor:pointer; transition:background 0.2s; }
    .btn:hover { background:#d4906c; }
    .error { font-size:0.8125rem; color:#d46b6b; padding:8px 12px; background:rgba(212,107,107,0.06); border-radius:8px; }
    .back-link { display:inline-block; margin-top:20px; font-size:0.75rem; color:var(--text-3); }
    .back-link:hover { color:var(--text); }

    @media(max-width:640px) { .stats{grid-template-columns:1fr} .links{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="page" id="app"></div>
  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('kyroo_token');
    let user = null;

    function headers() { return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' }; }
    function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

    async function init() {
      if (!token) return renderLogin();
      try {
        const res = await fetch(`${API}/api/auth/me`, { headers: headers() });
        if (!res.ok) throw new Error();
        user = await res.json();
        if (!user.is_admin) {
          document.getElementById('app').innerHTML = '<div class="login"><p class="login__title">Access Denied</p><p class="login__sub">Admin privileges required.</p><a href="/" class="back-link">Back to KYROO</a></div>';
          return;
        }
        renderDashboard();
      } catch (e) { renderLogin(); }
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login">
          <p class="login__title">KYROO Admin</p>
          <p class="login__sub">Log in with your admin account</p>
          <form id="loginForm">
            <input type="email" class="input" placeholder="Email" required id="email">
            <input type="password" class="input" placeholder="Password" required id="password">
            <div class="error" id="loginErr" hidden></div>
            <button type="submit" class="btn">Log in</button>
          </form>
          <a href="/" class="back-link">Back to KYROO</a>
        </div>
      `;
      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const err = document.getElementById('loginErr');
        err.hidden = true;
        try {
          const res = await fetch(`${API}/api/auth/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          if (!data.user.is_admin) throw new Error('Admin privileges required');
          token = data.token; user = data.user;
          localStorage.setItem('kyroo_token', token);
          renderDashboard();
        } catch (ex) { err.textContent = ex.message; err.hidden = false; }
      };
    }

    async function renderDashboard() {
      const stats = await fetch(`${API}/api/admin/stats`, { headers: headers() }).then(r => r.json());

      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="header__left">
            <a href="/" class="header__back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg></a>
            <span class="header__logo">KYROO <span>Admin</span></span>
          </div>
          <span class="header__user">${esc(user.name || user.email)}</span>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat__value">${stats.total_users}</div>
            <div class="stat__label">Users</div>
          </div>
          <div class="stat">
            <div class="stat__value">${stats.premium_users}</div>
            <div class="stat__label">Premium</div>
          </div>
          <div class="stat">
            <div class="stat__value">${stats.total_subscribers}</div>
            <div class="stat__label">Subscribers</div>
          </div>
        </div>

        <p class="section-title">Manage</p>
        <div class="links">
          <a href="/program.html" class="link-card">
            <div class="link-card__icon link-card__icon--accent">&#9776;</div>
            <div>
              <p class="link-card__title">Programs</p>
              <p class="link-card__desc">7 AI training tools for premium users</p>
            </div>
          </a>
          <a href="/" class="link-card">
            <div class="link-card__icon link-card__icon--sage">&#9728;</div>
            <div>
              <p class="link-card__title">Main Site</p>
              <p class="link-card__desc">kyroo.de</p>
            </div>
          </a>
        </div>

        <p class="section-title">Tools</p>
        <div class="links">
          <a href="https://dashboard.stripe.com/test/payments" target="_blank" class="link-card">
            <div class="link-card__icon link-card__icon--accent">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </div>
            <div>
              <p class="link-card__title">Stripe Payments</p>
              <p class="link-card__desc">View transactions, refunds, customers</p>
            </div>
          </a>
          <a href="https://dashboard.stripe.com/test/customers" target="_blank" class="link-card">
            <div class="link-card__icon link-card__icon--neutral">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div>
              <p class="link-card__title">Stripe Customers</p>
              <p class="link-card__desc">Manage subscribers and billing</p>
            </div>
          </a>
          <a href="/api-docs/" class="link-card">
            <div class="link-card__icon link-card__icon--neutral">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>
              <p class="link-card__title">API Docs</p>
              <p class="link-card__desc">Swagger documentation</p>
            </div>
          </a>
          <a href="https://dashboard.stripe.com/test/revenue" target="_blank" class="link-card">
            <div class="link-card__icon link-card__icon--sage">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
            </div>
            <div>
              <p class="link-card__title">Revenue</p>
              <p class="link-card__desc">MRR, growth, analytics</p>
            </div>
          </a>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
