<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kyroo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Design System ────────────────────────────────────────────── */
:root {
  --bg:          #08080a;
  --s1:          #0f0f12;
  --s2:          #161619;
  --s3:          #1e1e25;
  --bd:          rgba(255,255,255,0.06);
  --bd2:         rgba(255,255,255,0.13);
  --tx:          #eeeef2;
  --tx2:         #88889a;
  --tx3:         #3d3d52;
  --ac:          #6f6cf8;
  --acl:         #bbb9fc;
  --acd:         rgba(111,108,248,0.12);
  --gr:          #4ade80;
  --nav:         56px;
  --ease:        cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--tx); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ─── Scrollbar ─────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

/* ─── App ───────────────────────────────────────────────────────── */
#app { height: 100%; position: relative; overflow: hidden; }

/* ─── States ────────────────────────────────────────────────────── */
.state {
  position: absolute; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s var(--ease);
}
.state.active { opacity: 1; pointer-events: all; }

/* ─── Sys Bar ───────────────────────────────────────────────────── */
.sysbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}
.sysbar__logo {
  font-size: 13px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--tx);
}
.sysbar__status {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--tx3);
  transition: color 0.4s;
}
.sysbar__dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--tx3); transition: background 0.4s;
}
.sysbar__status.on { color: var(--acl); }
.sysbar__status.on .sysbar__dot { background: var(--ac); animation: breathe 2s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ─── Transition overlay ────────────────────────────────────────── */
#overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 500;
  opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
#overlay.flash { opacity: 1; }

/* ─── ══════ STATE: INTENT ══════ ──────────────────────────────── */
.s-intent {
  display: flex; align-items: center; justify-content: center;
}
.intent-wrap {
  width: 100%; max-width: 640px; padding: 0 32px;
  display: flex; flex-direction: column; gap: 28px;
}
.intent-prompt {
  font-size: clamp(1.6rem, 3.5vw, 2.6rem); font-weight: 300;
  letter-spacing: -0.025em; line-height: 1.2; color: var(--tx);
}
.intent-field { position: relative; }
.intent-textarea {
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--bd2); padding: 14px 0;
  font-size: clamp(1rem, 1.8vw, 1.2rem); font-weight: 400;
  color: var(--tx); outline: none; resize: none; line-height: 1.5;
  caret-color: var(--ac); transition: border-color 0.25s;
}
.intent-textarea::placeholder { color: var(--tx3); }
.intent-textarea:focus { border-color: var(--ac); }

/* Semantic chips */
.intent-chips {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; min-height: 28px;
}
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 2px;
  font-size: 10px; font-weight: 500; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.07em; text-transform: uppercase;
  border: 1px solid var(--bd); color: var(--tx3); background: transparent;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease),
              border-color 0.3s, color 0.3s, background 0.3s;
}
.chip.show { opacity: 1; transform: translateY(0); }
.chip.lit { border-color: var(--ac); color: var(--acl); background: var(--acd); }
.chip__key { color: inherit; opacity: .5; }
.chip.lit .chip__key { opacity: .6; }

.intent-actions {
  display: flex; align-items: center; gap: 20px;
}
.intent-go {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 13px 26px; background: var(--ac); color: #fff;
  border: none; border-radius: 3px; font-size: 14px; font-weight: 500;
  opacity: 0; transform: translateY(6px); pointer-events: none;
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease), background 0.2s;
}
.intent-go.show { opacity: 1; transform: translateY(0); pointer-events: all; }
.intent-go:hover { background: #8a87ff; }
.intent-go:active { transform: scale(0.98) translateY(0); }
.intent-hint {
  font-size: 11px; color: var(--tx3); font-family: 'JetBrains Mono', monospace;
  opacity: 0; transition: opacity 0.3s;
}
.intent-hint.show { opacity: 1; }

.intent-examples {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  font-size: 12px; color: var(--tx3);
}
.eg {
  padding: 5px 12px; border-radius: 2px; font-size: 12px;
  background: transparent; border: 1px solid var(--bd); color: var(--tx2);
  transition: all 0.2s;
}
.eg:hover { border-color: var(--bd2); color: var(--tx); background: var(--s1); }

/* ─── ══════ STATE: UNDERSTANDING ══════ ────────────────────────── */
.s-understanding {
  display: flex; flex-direction: row; padding-top: var(--nav); overflow: hidden;
}

/* Synthesis panel */
.synthesis {
  width: 300px; flex-shrink: 0; height: 100%;
  border-right: 1px solid var(--bd);
  display: flex; flex-direction: column; gap: 0;
  overflow-y: auto; padding: 40px 28px 32px;
}
.syn-label {
  font-size: 9px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx3);
  margin-bottom: 10px;
}
.syn-intent {
  font-size: 13px; color: var(--tx2); line-height: 1.5; font-style: italic;
  margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--bd);
}
.syn-items { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.syn-item {
  padding: 11px 14px; background: var(--s1); border: 1px solid var(--bd);
  border-radius: 3px;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
}
.syn-item.in { opacity: 1; transform: translateX(0); }
.syn-item__k {
  font-size: 9px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--tx3);
  margin-bottom: 3px;
}
.syn-item__v { font-size: 13px; font-weight: 500; color: var(--acl); }

.syn-foot { padding-top: 20px; border-top: 1px solid var(--bd); }
.syn-prog-label {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--tx3); margin-bottom: 8px; display: flex;
  justify-content: space-between;
}
.syn-bar { height: 1px; background: var(--s3); }
.syn-bar-fill { height: 100%; background: var(--ac); width: 0; transition: width 0.6s var(--ease); }

/* Q&A panel */
.qa-panel {
  flex: 1; min-width: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 56px; overflow-y: auto;
}
.qa-inner { width: 100%; max-width: 500px; }
.qa-step {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--tx3); display: flex; align-items: center; gap: 10px;
  margin-bottom: 24px;
}
.qa-step-track { flex: 1; height: 1px; background: var(--bd); position: relative; overflow: hidden; }
.qa-step-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--ac); transition: width 0.5s var(--ease); }
.qa-q {
  font-size: clamp(1.1rem, 2.4vw, 1.55rem); font-weight: 300;
  letter-spacing: -0.02em; color: var(--tx); line-height: 1.3;
  margin-bottom: 28px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
}
.qa-q.in { opacity: 1; transform: translateY(0); }
.qa-opts { display: flex; flex-direction: column; gap: 9px; }
.qa-opt {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px; background: var(--s1);
  border: 1px solid var(--bd); border-radius: 3px;
  text-align: left; width: 100%;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease),
              border-color 0.2s, background 0.2s;
}
.qa-opt.in { opacity: 1; transform: translateY(0); }
.qa-opt:hover { border-color: var(--bd2); background: var(--s2); }
.qa-opt.picked { border-color: var(--ac); background: var(--acd); }
.qa-opt__k { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--tx3); width: 16px; flex-shrink: 0; }
.qa-opt__body { flex: 1; min-width: 0; }
.qa-opt__label { font-size: 14px; font-weight: 500; color: var(--tx); line-height: 1.3; }
.qa-opt__desc { font-size: 12px; color: var(--tx2); margin-top: 2px; }
.qa-opt__dot {
  width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--bd);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, background 0.2s;
}
.qa-opt.picked .qa-opt__dot { border-color: var(--ac); background: var(--ac); }
.qa-opt.picked .qa-opt__dot::after {
  content: ''; display: block; width: 5px; height: 5px;
  background: white; border-radius: 50%;
}

/* Number/text input inside Q&A */
.qa-num-wrap {
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
}
.qa-num-wrap.in { opacity: 1; transform: translateY(0); }
.qa-num-row { display: flex; gap: 12px; flex-wrap: wrap; }
.qa-num-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
.qa-num-field label {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--tx3);
}
.qa-num {
  padding: 14px 16px; background: var(--s1); border: 1px solid var(--bd);
  border-radius: 3px; font-size: 16px; color: var(--tx); outline: none;
  caret-color: var(--ac); transition: border-color 0.2s;
  -moz-appearance: textfield;
}
.qa-num::-webkit-inner-spin-button { display: none; }
.qa-num:focus { border-color: var(--ac); }
.qa-num::placeholder { color: var(--tx3); }
.qa-submit {
  margin-top: 14px; padding: 13px 24px; background: var(--ac); color: white;
  border: none; border-radius: 3px; font-size: 13px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background 0.2s;
}
.qa-submit:hover { background: #8a87ff; }

/* ─── ══════ STATE: GENERATION ══════ ────────────────────────────── */
.s-generation { padding-top: var(--nav); overflow-y: auto; }
.gen-wrap { max-width: 760px; margin: 0 auto; padding: 48px 32px 80px; }

.gen-eyebrow {
  font-size: 9px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx3);
  margin-bottom: 12px;
}
.gen-headline {
  font-size: clamp(1.4rem, 2.8vw, 2rem); font-weight: 300;
  letter-spacing: -0.02em; color: var(--tx); margin-bottom: 24px;
}
.gen-pbar { height: 1px; background: var(--bd); position: relative; margin-bottom: 6px; }
.gen-pfill {
  height: 100%; background: var(--ac); width: 0; transition: width 0.8s var(--ease);
  position: relative;
}
.gen-pfill::after {
  content: ''; position: absolute; right: -3px; top: -3px;
  width: 7px; height: 7px; background: var(--ac); border-radius: 50%;
}
.gen-pct {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--tx3); text-align: right; margin-bottom: 48px;
}

.gen-sections { display: flex; flex-direction: column; gap: 36px; }
.gen-sec {
  opacity: 0; transform: translateY(18px);
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
}
.gen-sec.in { opacity: 1; transform: translateY(0); }
.gen-sec-head {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 12px; border-bottom: 1px solid var(--bd); margin-bottom: 16px;
}
.gen-sec-n { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--ac); }
.gen-sec-t { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--tx2); }
.gen-sec-s {
  margin-left: auto; font-size: 9px; font-family: 'JetBrains Mono', monospace;
  color: var(--tx3); transition: color 0.3s;
}
.gen-sec-s.running { color: var(--ac); animation: blink 1s step-end infinite; }
.gen-sec-s.done { color: var(--gr); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.gen-sec-body {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--tx2); line-height: 1.8;
}
.gen-line {
  display: block; opacity: 0; transform: translateX(-6px);
  transition: opacity 0.22s var(--ease), transform 0.22s var(--ease), color 0.6s;
}
.gen-line.in { opacity: 1; transform: translateX(0); }
.gen-line.fresh { color: var(--acl); }

/* dots loader */
.dots::after { animation: dotanim 1.4s steps(4, end) infinite; }
@keyframes dotanim { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} 100%{content:''} }

/* ─── ══════ STATE: OWNERSHIP ══════ ─────────────────────────────── */
.s-ownership { padding-top: var(--nav); overflow-y: auto; }
.own-wrap {
  max-width: 880px; margin: 0 auto; padding: 48px 32px 80px;
  display: grid; grid-template-columns: 1fr 300px; gap: 48px; align-items: start;
}

.own-eyebrow {
  font-size: 9px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx3);
  margin-bottom: 20px;
}
.own-blocks { display: flex; flex-direction: column; gap: 16px; }
.own-block {
  padding: 22px; background: var(--s1); border: 1px solid var(--bd); border-radius: 3px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
}
.own-block.in { opacity: 1; transform: translateY(0); }
.own-block-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.own-block-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--tx2); }
.own-block-n {
  font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px;
  border-radius: 2px; background: var(--acd); color: var(--acl);
}
.own-block-body { font-size: 12px; color: var(--tx2); line-height: 1.7; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; }

/* Sidebar */
.own-side { position: sticky; top: calc(var(--nav) + 40px); }
.own-card { padding: 24px; background: var(--s1); border: 1px solid var(--bd); border-radius: 3px; }
.own-card-label {
  font-size: 9px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx3);
  margin-bottom: 16px;
}
.own-meta { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.own-meta-row { display: flex; justify-content: space-between; font-size: 13px; }
.own-meta-k { color: var(--tx3); }
.own-meta-v { color: var(--tx); font-weight: 500; }
.own-dl {
  width: 100%; padding: 15px; background: var(--ac); color: white;
  border: none; border-radius: 3px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  margin-bottom: 9px; transition: background 0.2s;
}
.own-dl:hover:not(:disabled) { background: #8a87ff; }
.own-dl:disabled { opacity: .6; cursor: default; }
.own-again {
  width: 100%; padding: 11px; background: transparent;
  border: 1px solid var(--bd); border-radius: 3px; font-size: 12px; color: var(--tx3);
  transition: border-color 0.2s, color 0.2s;
}
.own-again:hover { border-color: var(--bd2); color: var(--tx2); }

/* Login nudge (shown when not auth'd) */
.own-login-nudge {
  margin-top: 14px; padding: 14px; background: var(--s2); border: 1px solid var(--bd);
  border-radius: 3px; font-size: 12px; color: var(--tx2); line-height: 1.5;
  display: none;
}
.own-login-nudge a { color: var(--acl); text-decoration: none; }
.own-login-nudge.show { display: block; }

/* ─── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 780px) {
  .synthesis { display: none; }
  .qa-panel { padding: 28px 20px; }
  .own-wrap { grid-template-columns: 1fr; }
  .own-side { position: static; }
  .sysbar { padding: 0 20px; }
  .intent-wrap { padding: 0 20px; }
  .gen-wrap { padding: 32px 20px 60px; }
}
</style>
</head>
<body>

<!-- ── Sysbar ── -->
<header class="sysbar">
  <div class="sysbar__logo">Kyroo</div>
  <div class="sysbar__status" id="sysStatus">
    <div class="sysbar__dot"></div>
    <span id="sysLabel">ready</span>
  </div>
</header>

<!-- ── Overlay ── -->
<div id="overlay"></div>

<!-- ── App ── -->
<div id="app">

<!-- ════ INTENT ════ -->
<section class="state s-intent active" id="s-intent">
  <div class="intent-wrap">
    <div class="intent-prompt">What do you want<br>to achieve?</div>
    <div class="intent-field">
      <textarea class="intent-textarea" id="intentInput" rows="2"
        placeholder="Describe your goal in your own words…"
        autocomplete="off" spellcheck="false"></textarea>
      <div class="intent-chips" id="chips">
        <div class="chip show" id="chip-goal"><span class="chip__key">goal</span>&nbsp;<span id="cv-goal">—</span></div>
        <div class="chip show" id="chip-time"><span class="chip__key">time</span>&nbsp;<span id="cv-time">—</span></div>
        <div class="chip show" id="chip-level"><span class="chip__key">level</span>&nbsp;<span id="cv-level">—</span></div>
        <div class="chip show" id="chip-place"><span class="chip__key">where</span>&nbsp;<span id="cv-place">—</span></div>
      </div>
    </div>
    <div class="intent-actions">
      <button class="intent-go" id="intentGo">
        Begin
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M3 7.5h9M8 3.5l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="intent-hint" id="intentHint">↵ Enter to continue</span>
    </div>
    <div class="intent-examples">
      <span>Try:</span>
      <button class="eg" data-eg="lose weight before summer">lose weight before summer</button>
      <button class="eg" data-eg="build muscle in 12 weeks">build muscle in 12 weeks</button>
      <button class="eg" data-eg="get fit training at home">get fit training at home</button>
      <button class="eg" data-eg="beginner strength program">beginner strength program</button>
    </div>
  </div>
</section>

<!-- ════ UNDERSTANDING ════ -->
<section class="state s-understanding" id="s-understanding">
  <div class="synthesis">
    <div class="syn-label">Kyroo understands</div>
    <div class="syn-intent" id="synIntent"></div>
    <div class="syn-items" id="synItems"></div>
    <div class="syn-foot">
      <div class="syn-prog-label">
        <span id="synProgText">0 answered</span>
        <span id="synProgPct">0%</span>
      </div>
      <div class="syn-bar"><div class="syn-bar-fill" id="synFill"></div></div>
    </div>
  </div>
  <div class="qa-panel">
    <div class="qa-inner">
      <div class="qa-step">
        <span id="qaStepText">1</span>
        <div class="qa-step-track"><div class="qa-step-fill" id="qaStepFill"></div></div>
      </div>
      <div class="qa-q" id="qaQ"></div>
      <div class="qa-opts" id="qaOpts"></div>
    </div>
  </div>
</section>

<!-- ════ GENERATION ════ -->
<section class="state s-generation" id="s-generation">
  <div class="gen-wrap">
    <div class="gen-eyebrow">Building your program</div>
    <div class="gen-headline" id="genHead">Structuring<span class="dots"></span></div>
    <div class="gen-pbar"><div class="gen-pfill" id="genFill"></div></div>
    <div class="gen-pct" id="genPct">0%</div>
    <div class="gen-sections" id="genSecs"></div>
  </div>
</section>

<!-- ════ OWNERSHIP ════ -->
<section class="state s-ownership" id="s-ownership">
  <div class="own-wrap">
    <div>
      <div class="own-eyebrow">Your program</div>
      <div class="own-blocks" id="ownBlocks"></div>
    </div>
    <div class="own-side">
      <div class="own-card">
        <div class="own-card-label">Summary</div>
        <div class="own-meta" id="ownMeta"></div>
        <button class="own-dl" id="ownDl">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 2v8M3.5 7l4 4 4-4M2 12h11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download PDF
        </button>
        <button class="own-again" id="ownAgain">Start over</button>
        <div class="own-login-nudge" id="loginNudge">
          <a href="/index.html#login">Sign in</a> to save and download your program as PDF.
        </div>
      </div>
    </div>
  </div>
</section>

</div><!-- #app -->

<script>
/* ═══════════════════════════════════════════════════════════
   KYROO — Adaptive Intent Design System
   State machine: intent → understanding → generation → ownership
   ═══════════════════════════════════════════════════════════ */

const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3001' : '';

/* ── App state ─────────────────────────────────────────────── */
const App = {
  state: 'intent',
  data: {
    raw: '',
    parsed: {},     // { goal, timeframe, level, place }
    answers: {},    // { key: { value, label } }
    program: null,  // raw text from API
    pdfUrl: null,
  },

  go(next) {
    const ov = document.getElementById('overlay');
    ov.classList.add('flash');
    setTimeout(() => {
      document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
      document.getElementById('s-' + next).classList.add('active');
      this.state = next;
      ov.classList.remove('flash');
      Sys.set(next);
      if (next === 'understanding') Understanding.enter();
      if (next === 'generation')   Generation.enter();
      if (next === 'ownership')    Ownership.enter();
    }, 180);
  },
};

/* ── System bar ────────────────────────────────────────────── */
const Sys = {
  labels: { intent: 'ready', understanding: 'listening', generation: 'generating', ownership: 'complete' },
  set(s) {
    const el = document.getElementById('sysStatus');
    document.getElementById('sysLabel').textContent = this.labels[s] || s;
    s === 'generation' ? el.classList.add('on') : el.classList.remove('on');
  },
};

/* ── Intent parser ─────────────────────────────────────────── */
const Parser = {
  defs: {
    goal: [
      { kw: ['lose weight','weight loss','fat loss','fat','slim','lean','cut','shred','burn','calorie','diet'], v: 'weight_loss', l: 'Lose weight' },
      { kw: ['muscle','bulk','gain','mass','strong','build muscle','strength','hypertrophy','bigger'], v: 'hypertrophy', l: 'Build muscle' },
      { kw: ['fit','fitness','shape','tone','health','healthy','athletic','active','cardio fitness'], v: 'general fitness', l: 'Get fit' },
      { kw: ['marathon','run','running','endurance','race','5k','10k'], v: 'endurance', l: 'Endurance' },
      { kw: ['beginner','never trained','first time','new to','just starting','start working out'], v: 'general fitness', l: 'Start training' },
      { kw: ['transform','transformation','change my body','total'], v: 'body recomposition', l: 'Transformation' },
    ],
    timeframe: [
      { kw: ['summer','beach','12 week','3 month','90 day'], v: '12', l: '12 weeks' },
      { kw: ['8 week','2 month','56 day'], v: '8', l: '8 weeks' },
      { kw: ['4 week','1 month','28 day','30 day'], v: '4', l: '4 weeks' },
      { kw: ['6 month','half year','24 week'], v: '24', l: '6 months' },
      { kw: ['year','12 month','long term'], v: '52', l: '1 year' },
    ],
    level: [
      { kw: ['beginner','never','first time','new to','just start','no experience','never trained'], v: 'beginner', l: 'Beginner' },
      { kw: ['intermediate','some experience','been training','year or two'], v: 'intermediate', l: 'Intermediate' },
      { kw: ['advanced','experienced','years of training','serious lifter','athlete'], v: 'advanced', l: 'Advanced' },
    ],
    place: [
      { kw: ['home','no gym','bodyweight','no equipment','apartment','bedroom','living room'], v: 'home gym / bodyweight only', l: 'At home' },
      { kw: ['gym','weights','barbell','dumbbell','lifting','membership','commercial'], v: 'full commercial gym', l: 'At the gym' },
      { kw: ['outdoor','outside','park','trail','open air'], v: 'outdoors / minimal', l: 'Outdoors' },
    ],
  },

  run(text) {
    const t = text.toLowerCase();
    const out = {};
    for (const [dim, patterns] of Object.entries(this.defs)) {
      for (const p of patterns) {
        if (p.kw.some(k => t.includes(k))) { out[dim] = { v: p.v, l: p.l }; break; }
      }
    }
    return out;
  },
};

/* ── Intent state ──────────────────────────────────────────── */
const Intent = {
  init() {
    const inp = document.getElementById('intentInput');
    const go  = document.getElementById('intentGo');
    const hi  = document.getElementById('intentHint');

    inp.addEventListener('input', () => {
      const parsed = Parser.run(inp.value);
      App.data.parsed = parsed;
      this.chips(parsed);
      const ok = inp.value.trim().length >= 3;
      go.classList.toggle('show', ok);
      hi.classList.toggle('show', ok);
    });

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.submit(); }
    });

    go.addEventListener('click', () => this.submit());

    document.querySelectorAll('.eg').forEach(b => {
      b.addEventListener('click', () => {
        inp.value = b.dataset.eg;
        inp.dispatchEvent(new Event('input'));
        inp.focus();
      });
    });
  },

  chips(p) {
    const map = { goal: 'goal', time: 'timeframe', level: 'level', place: 'place' };
    for (const [id, dim] of Object.entries(map)) {
      const chip = document.getElementById('chip-' + id);
      const val  = document.getElementById('cv-' + id);
      const hit  = p[dim];
      val.textContent = hit ? hit.l : '—';
      chip.classList.toggle('lit', !!hit);
    }
  },

  submit() {
    const raw = document.getElementById('intentInput').value.trim();
    if (!raw) return;
    App.data.raw    = raw;
    App.data.parsed = Parser.run(raw);
    QEngine.build(App.data.parsed);
    App.go('understanding');
  },
};

/* ── Question engine ───────────────────────────────────────── */
const QEngine = {
  list: [],
  idx: 0,
  total: 0,

  build(parsed) {
    this.list = [];
    this.idx  = 0;

    if (!parsed.goal)
      this.list.push({ id: 'goal', label: 'Goal', q: 'What\'s your main goal?', type: 'choice', opts: [
        { v: 'weight_loss',      l: 'Lose weight',     d: 'Reduce body fat, improve body composition' },
        { v: 'hypertrophy',      l: 'Build muscle',    d: 'Increase strength and lean muscle mass' },
        { v: 'general fitness',  l: 'Get fit',         d: 'Improve overall health and performance' },
        { v: 'body recomposition', l: 'Transform',     d: 'Complete physical and lifestyle change' },
      ]});

    if (!parsed.level)
      this.list.push({ id: 'level', label: 'Experience', q: 'What\'s your training experience?', type: 'choice', opts: [
        { v: 'beginner',     l: 'Beginner',     d: 'Under 6 months of consistent training' },
        { v: 'intermediate', l: 'Intermediate', d: '6 months to 2 years of training' },
        { v: 'advanced',     l: 'Advanced',     d: 'Over 2 years of consistent training' },
      ]});

    if (!parsed.place)
      this.list.push({ id: 'place', label: 'Location', q: 'Where will you train?', type: 'choice', opts: [
        { v: 'full commercial gym',     l: 'Gym',         d: 'Full access to weights and machines' },
        { v: 'home gym / bodyweight only', l: 'At home',  d: 'Minimal or no equipment' },
        { v: 'outdoors / minimal',      l: 'Outdoors',    d: 'Parks, trails, open spaces' },
      ]});

    this.list.push({ id: 'days', label: 'Days/week', q: 'How many days per week can you train?', type: 'choice', opts: [
      { v: '3', l: '3 days',   d: 'Ideal for busy schedules' },
      { v: '4', l: '4 days',   d: 'Balanced commitment' },
      { v: '5', l: '5 days',   d: 'Strong dedication' },
      { v: '6', l: '6 days',   d: 'High-frequency training' },
    ]});

    this.list.push({ id: 'session', label: 'Session length', q: 'How long per session?', type: 'choice', opts: [
      { v: '30',  l: '30 min',  d: 'Short, efficient sessions' },
      { v: '45',  l: '45 min',  d: 'Standard session length' },
      { v: '60',  l: '60 min',  d: 'Full training hour' },
      { v: '90',  l: '90 min',  d: 'Extensive sessions' },
    ]});

    this.list.push({ id: 'sex', label: 'Sex', q: 'Your biological sex — for accurate calculations.', type: 'choice', opts: [
      { v: 'male',   l: 'Male',   d: '' },
      { v: 'female', l: 'Female', d: '' },
    ]});

    this.list.push({ id: 'metrics', label: 'Body', q: 'Your age, weight, and height.', type: 'metrics' });

    this.total = this.list.length;
  },

  current() { return this.list[this.idx] || null; },

  answer(id, value, label) {
    App.data.answers[id] = { value, label };
    if (['goal','level','place'].includes(id)) {
      App.data.parsed[id === 'place' ? 'place' : id] = { v: value, l: label };
    }
    Understanding.addItem(id, label);
    this.idx++;
    const prog = this.idx / this.total;
    Understanding.progress(prog, this.idx, this.total);
    if (this.idx >= this.list.length) {
      setTimeout(() => App.go('generation'), 550);
    } else {
      Understanding.showQ(this.current());
    }
  },
};

/* ── Understanding state ───────────────────────────────────── */
const Understanding = {
  DIM_LABELS: { goal:'Goal', timeframe:'Duration', level:'Experience', place:'Location', days:'Days/week', session:'Per session', sex:'Sex', metrics:'Age / Weight / Height' },

  enter() {
    document.getElementById('synIntent').textContent = '\u201c' + App.data.raw + '\u201d';
    document.getElementById('synItems').innerHTML = '';

    // Pre-populate synthesis from already-parsed intent
    let delay = 0;
    for (const [dim, data] of Object.entries(App.data.parsed)) {
      if (!data) continue;
      App.data.answers[dim] = { value: data.v, label: data.l };
      setTimeout(() => this.addItem(dim, data.l), delay);
      delay += 120;
    }

    setTimeout(() => {
      const q = QEngine.current();
      if (q) this.showQ(q);
    }, delay + 200);
  },

  addItem(id, label) {
    const container = document.getElementById('synItems');
    if (document.getElementById('si-' + id)) return;
    const el = document.createElement('div');
    el.className = 'syn-item';
    el.id = 'si-' + id;
    el.innerHTML = `<div class="syn-item__k">${this.DIM_LABELS[id] || id}</div><div class="syn-item__v">${label}</div>`;
    container.appendChild(el);
    requestAnimationFrame(() => setTimeout(() => el.classList.add('in'), 30));
  },

  progress(ratio, done, total) {
    document.getElementById('synFill').style.width    = (ratio * 100) + '%';
    document.getElementById('synProgText').textContent = done + ' / ' + total + ' answered';
    document.getElementById('synProgPct').textContent  = Math.round(ratio * 100) + '%';
    document.getElementById('qaStepText').textContent  = Math.min(done + 1, total) + ' / ' + total;
    document.getElementById('qaStepFill').style.width  = (ratio * 100) + '%';
  },

  showQ(q) {
    const qEl   = document.getElementById('qaQ');
    const optsEl = document.getElementById('qaOpts');

    qEl.classList.remove('in');
    optsEl.querySelectorAll('*').forEach(c => c.classList.remove('in'));

    setTimeout(() => {
      qEl.textContent = q.q;
      optsEl.innerHTML = '';

      if (q.type === 'choice') {
        q.opts.forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'qa-opt';
          btn.innerHTML = `
            <div class="qa-opt__k">${String.fromCharCode(65 + i)}</div>
            <div class="qa-opt__body">
              <div class="qa-opt__label">${opt.l}</div>
              ${opt.d ? `<div class="qa-opt__desc">${opt.d}</div>` : ''}
            </div>
            <div class="qa-opt__dot"></div>`;
          btn.addEventListener('click', () => {
            optsEl.querySelectorAll('.qa-opt').forEach(b => b.classList.remove('picked'));
            btn.classList.add('picked');
            setTimeout(() => QEngine.answer(q.id, opt.v, opt.l), 280);
          });
          optsEl.appendChild(btn);
          setTimeout(() => btn.classList.add('in'), 60 + i * 55);
        });

        const onKey = e => {
          const i = e.key.toUpperCase().charCodeAt(0) - 65;
          if (i >= 0 && i < q.opts.length) {
            optsEl.querySelectorAll('.qa-opt')[i]?.click();
            document.removeEventListener('keydown', onKey);
          }
        };
        document.addEventListener('keydown', onKey);

      } else if (q.type === 'metrics') {
        const wrap = document.createElement('div');
        wrap.className = 'qa-num-wrap';
        wrap.innerHTML = `
          <div class="qa-num-row">
            <div class="qa-num-field"><label>Age</label><input class="qa-num" id="mAge" type="number" min="13" max="99" placeholder="28"></div>
            <div class="qa-num-field"><label>Weight (kg)</label><input class="qa-num" id="mWeight" type="number" min="30" max="300" placeholder="75"></div>
            <div class="qa-num-field"><label>Height (cm)</label><input class="qa-num" id="mHeight" type="number" min="120" max="250" placeholder="178"></div>
          </div>
          <button class="qa-submit" id="metricsSubmit">Continue →</button>`;
        optsEl.appendChild(wrap);
        setTimeout(() => wrap.classList.add('in'), 60);

        const submit = () => {
          const age    = document.getElementById('mAge').value;
          const weight = document.getElementById('mWeight').value;
          const height = document.getElementById('mHeight').value;
          if (!age || !weight || !height) return;
          App.data.answers.age    = { value: age,    label: age + ' years' };
          App.data.answers.weight = { value: weight, label: weight + ' kg' };
          App.data.answers.height = { value: height, label: height + ' cm' };
          QEngine.answer(q.id, `${age}y / ${weight}kg / ${height}cm`, `${age}y · ${weight}kg · ${height}cm`);
        };
        document.getElementById('metricsSubmit').addEventListener('click', submit);
        wrap.querySelectorAll('.qa-num').forEach(inp => inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
        setTimeout(() => document.getElementById('mAge').focus(), 200);
      }

      requestAnimationFrame(() => setTimeout(() => qEl.classList.add('in'), 20));
    }, 180);
  },
};

/* ── Generation state ──────────────────────────────────────── */
const Generation = {
  SECS: [
    { id: 'overview',  t: 'Program Overview' },
    { id: 'schedule',  t: 'Weekly Schedule' },
    { id: 'training',  t: 'Training Plan' },
    { id: 'nutrition', t: 'Nutrition Guidelines' },
    { id: 'recovery',  t: 'Recovery Protocol' },
  ],

  enter() {
    const container = document.getElementById('genSecs');
    container.innerHTML = '';

    this.SECS.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'gen-sec';
      el.id = 'gs-' + s.id;
      el.innerHTML = `
        <div class="gen-sec-head">
          <div class="gen-sec-n">0${i + 1}</div>
          <div class="gen-sec-t">${s.t}</div>
          <div class="gen-sec-s" id="gss-${s.id}">—</div>
        </div>
        <div class="gen-sec-body" id="gsb-${s.id}"></div>`;
      container.appendChild(el);
      setTimeout(() => el.classList.add('in'), 150 + i * 100);
    });

    setTimeout(() => this.run(), 700);
  },

  setPct(n, label) {
    document.getElementById('genFill').style.width = n + '%';
    document.getElementById('genPct').textContent  = n + '%';
    if (n >= 100) document.getElementById('genHead').innerHTML = 'Your program is ready';
    else          document.getElementById('genHead').innerHTML = (label || 'Structuring') + '<span class="dots"></span>';
  },

  setSS(id, mode) {
    const el = document.getElementById('gss-' + id);
    if (!el) return;
    el.className = 'gen-sec-s ' + mode;
    el.textContent = mode === 'running' ? 'generating' : mode === 'done' ? '✓' : '—';
  },

  revealText(id, text, baseDelay = 0) {
    const body  = document.getElementById('gsb-' + id);
    const lines = text.split('\n');
    let i = 0;
    const next = () => {
      if (i >= lines.length) return lines.length;
      const span = document.createElement('span');
      span.className = 'gen-line fresh';
      span.textContent = lines[i];
      body.appendChild(span);
      body.appendChild(document.createTextNode('\n'));
      requestAnimationFrame(() => {
        setTimeout(() => {
          span.classList.add('in');
          setTimeout(() => span.classList.remove('fresh'), 700);
        }, 20);
      });
      i++;
      setTimeout(next, 55);
    };
    setTimeout(next, baseDelay);
    return lines.length * 55 + 400;
  },

  async run() {
    const a = App.data.answers;
    const p = App.data.parsed;

    const level    = p.level?.v || a.level?.value || 'beginner';
    const equipment= p.place?.v || a.place?.value || 'full commercial gym';
    const goal     = p.goal?.v  || a.goal?.value  || 'general fitness';
    const days     = a.days?.value    || '4';
    const session  = a.session?.value || '60';
    const sex      = a.sex?.value     || 'male';
    const age      = a.age?.value     || '';
    const weight   = a.weight?.value  || '';
    const height   = a.height?.value  || '';

    this.setPct(10, 'Analyzing');

    const token = localStorage.getItem('kyroo_token');

    if (!token) {
      // Demo mode — no auth
      this.setPct(30, 'Preparing preview');
      await this.demo(goal, level, equipment, days, session);
      return;
    }

    try {
      this.setPct(25, 'Connecting');
      this.setSS('overview', 'running');

      const res = await fetch(API + '/api/program/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          level, equipment, primary_goal: goal,
          days_per_week: days, session_minutes: session,
          sex, age, weight, height,
          experience_years: level === 'advanced' ? '3+' : level === 'intermediate' ? '1-2' : '<1',
        }),
      });

      this.setPct(55, 'Receiving program');

      if (!res.ok) throw new Error('API ' + res.status);

      const data = await res.json();
      App.data.program = data.program || '';

      await this.reveal(App.data.program);

    } catch (err) {
      console.error('Generation error:', err);
      await this.demo(goal, level, equipment, days, session);
    }
  },

  async reveal(text) {
    const chunks = this.split(text);
    let delay = 0;
    for (let i = 0; i < this.SECS.length; i++) {
      const s = this.SECS[i];
      await sleep(delay);
      this.setSS(s.id, 'running');
      this.setPct(55 + Math.round((i / this.SECS.length) * 40), 'Building ' + s.t);
      await sleep(250);
      delay = this.revealText(s.id, chunks[i] || '');
      this.setSS(s.id, 'done');
    }
    await sleep(delay + 400);
    this.setPct(100);
    setTimeout(() => App.go('ownership'), 700);
  },

  split(text) {
    if (!text) return [];
    const lines = text.split('\n');
    const sz    = Math.ceil(lines.length / this.SECS.length);
    return this.SECS.map((_, i) => lines.slice(i * sz, (i + 1) * sz).join('\n').trim());
  },

  async demo(goal, level, place, days, session) {
    const G = { weight_loss: 'Weight Loss', hypertrophy: 'Muscle Building', 'general fitness': 'General Fitness', 'body recomposition': 'Transformation', endurance: 'Endurance' };
    const P = { 'full commercial gym': 'Gym', 'home gym / bodyweight only': 'Home', 'outdoors / minimal': 'Outdoors' };
    const demo = {
      overview:  `Program: ${G[goal] || goal}\nLevel: ${level}\nLocation: ${P[place] || place}\nDays/week: ${days}\nSession: ${session} min\n\nThis is a preview of your personalized program.\nSign in to generate and download the full PDF.`,
      schedule:  `Monday    — Training A (Push focus)\nTuesday   — Active recovery / Mobility\nWednesday — Training B (Pull focus)\nThursday  — Rest\nFriday    — Training C (Legs + Core)\nSaturday  — Optional: Conditioning\nSunday    — Full rest`,
      training:  `Session A — 4×8 Compound movements\nSession B — 3×12 Accessory work\nSession C — Circuit / Conditioning\n\nProgressive overload: +2.5kg/week (upper)\nRest between sets: 90–120 sec\nWarm-up: 10 min every session`,
      nutrition: `Daily target: ~${goal === 'weight_loss' ? '1,850' : '2,600'} kcal\nProtein: ${goal === 'hypertrophy' ? '185g' : '150g'} / day\nCarbs: prioritize around training\nHydration: 2.5–3L / day\n\nPre-workout: complex carbs + protein\nPost-workout: fast protein + carbs`,
      recovery:  `Sleep: 7–9 hours\nMobility: 15 min each morning\nDeload: every 4th week\nCold exposure: optional post-training\n\nListen to your body.\nRest is part of the program.`,
    };

    let delay = 0;
    for (let i = 0; i < this.SECS.length; i++) {
      const s = this.SECS[i];
      await sleep(delay + 200);
      this.setSS(s.id, 'running');
      this.setPct(30 + Math.round((i / this.SECS.length) * 65), 'Building ' + s.t);
      await sleep(350);
      delay = this.revealText(s.id, demo[s.id] || '');
      this.setSS(s.id, 'done');
    }
    await sleep(delay + 400);
    this.setPct(100);
    App.data.isDemo = true;
    setTimeout(() => App.go('ownership'), 700);
  },
};

/* ── Ownership state ───────────────────────────────────────── */
const Ownership = {
  TITLES: { overview: 'Program Overview', schedule: 'Weekly Schedule', training: 'Training Plan', nutrition: 'Nutrition', recovery: 'Recovery' },
  KEYS:   { goal: 'Goal', level: 'Level', place: 'Location', days: 'Days/week', session: 'Session', sex: 'Sex', metrics: 'Body' },

  enter() {
    // Meta
    const meta = document.getElementById('ownMeta');
    meta.innerHTML = '';
    const p = App.data.parsed;
    const a = App.data.answers;
    const rows = [
      ['Goal',      p.goal?.l  || a.goal?.label   || '—'],
      ['Level',     p.level?.l || a.level?.label   || '—'],
      ['Location',  p.place?.l || a.place?.label   || '—'],
      ['Days/week', a.days?.label    || '—'],
      ['Session',   a.session?.label || '—'],
    ];
    rows.forEach(([k, v]) => {
      const r = document.createElement('div');
      r.className = 'own-meta-row';
      r.innerHTML = `<span class="own-meta-k">${k}</span><span class="own-meta-v">${v}</span>`;
      meta.appendChild(r);
    });

    // Preview blocks from gen content
    const blocks = document.getElementById('ownBlocks');
    blocks.innerHTML = '';
    Generation.SECS.forEach((s, i) => {
      const body = document.getElementById('gsb-' + s.id);
      const text = body ? body.innerText.trim() : '';
      const el   = document.createElement('div');
      el.className = 'own-block';
      el.innerHTML = `
        <div class="own-block-head">
          <div class="own-block-title">${s.t}</div>
          <div class="own-block-n">0${i + 1}</div>
        </div>
        <div class="own-block-body">${text}</div>`;
      blocks.appendChild(el);
      setTimeout(() => el.classList.add('in'), 80 + i * 90);
    });

    // Auth state
    const token = localStorage.getItem('kyroo_token');
    const nudge = document.getElementById('loginNudge');
    nudge.classList.toggle('show', !token);

    document.getElementById('ownDl').addEventListener('click', () => this.download());
    document.getElementById('ownAgain').addEventListener('click', () => this.restart());
  },

  async download() {
    const token = localStorage.getItem('kyroo_token');
    if (!token) {
      document.getElementById('loginNudge').classList.add('show');
      document.getElementById('loginNudge').scrollIntoView({ behavior: 'smooth' });
      return;
    }
    const btn = document.getElementById('ownDl');
    btn.disabled = true;
    btn.textContent = 'Generating PDF…';

    try {
      const p = App.data.parsed;
      const a = App.data.answers;
      const res = await fetch(API + '/api/program/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          level:           p.level?.v || a.level?.value || 'beginner',
          equipment:       p.place?.v || a.place?.value || 'full commercial gym',
          primary_goal:    p.goal?.v  || a.goal?.value  || 'general fitness',
          days_per_week:   a.days?.value    || '4',
          session_minutes: a.session?.value || '60',
          sex:             a.sex?.value     || 'male',
          age:             a.age?.value     || '',
          weight:          a.weight?.value  || '',
          height:          a.height?.value  || '',
          experience_years: (p.level?.v || 'beginner') === 'advanced' ? '3+' : (p.level?.v || 'beginner') === 'intermediate' ? '1-2' : '<1',
        }),
      });
      if (res.ok) {
        const data = await res.json();
        if (data.pdf_url || data.pdfUrl) window.open(data.pdf_url || data.pdfUrl, '_blank');
      }
    } catch(e) { console.error(e); }

    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v8M3.5 7l4 4 4-4M2 12h11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Download PDF`;
  },

  restart() {
    App.data = { raw: '', parsed: {}, answers: {}, program: null, pdfUrl: null, isDemo: false };
    QEngine.idx = 0; QEngine.list = [];
    const inp = document.getElementById('intentInput');
    inp.value = '';
    inp.dispatchEvent(new Event('input'));
    document.getElementById('synItems').innerHTML = '';
    document.getElementById('genSecs').innerHTML = '';
    document.getElementById('ownBlocks').innerHTML = '';
    App.go('intent');
    setTimeout(() => inp.focus(), 400);
  },
};

/* ── Util ──────────────────────────────────────────────────── */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Boot ──────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  Intent.init();
  Sys.set('intent');
  setTimeout(() => document.getElementById('intentInput').focus(), 120);
});
</script>
</body>
</html>
