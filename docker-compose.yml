services:
  db:
    image: postgres:16-alpine
    container_name: kyroo-db
    environment:
      POSTGRES_DB: kyroo
      POSTGRES_USER: kyroo
      POSTGRES_PASSWORD: kyroo_pass
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyroo"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
